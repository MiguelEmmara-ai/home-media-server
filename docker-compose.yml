services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    platform: linux/arm64
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_data:/config
      - ~/media-server-data/media:/media:ro
    restart: unless-stopped

  emby:
    image: emby/embyserver:latest
    platform: linux/arm64
    container_name: emby
    environment:
      - UID=1000
      - GID=1000
      - TZ=${TZ}
    ports:
      - "8920:8096"
    volumes:
      - emby_data:/config
      - ~/media-server-data/media:/media:ro
    restart: unless-stopped

  nzbget:
    image: linuxserver/nzbget:v26.1-ls247
    platform: linux/arm64
    container_name: nzbget
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - "6789:6789"
    volumes:
      - nzbget_data:/config
      - downloads_data:/downloads
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    platform: linux/arm64
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_data:/etc/nginx/certs
    depends_on:
      - plex
      - sonarr
      - radarr
      - qbittorrent
      - prowlarr
      - jellyseerr
    restart: unless-stopped

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    platform: linux/arm64
    container_name: cloudflare-tunnel
    command: tunnel run --protocol quic
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - default
    restart: unless-stopped
    depends_on:
      - plex

  plex:
    image: plexinc/pms-docker:1.43.2.10687-563d026ea
    platform: linux/arm64
    container_name: plex
    environment:
      - PLEX_CLAIM=${PLEX_CLAIM}
    ports:
      - "32400:32400"
    volumes:
      - plex_data:/config
      - ~/media-server-data/media:/media
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:5.2.1
    platform: linux/arm64
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - "6881:6881/udp"
      - "8080:8080"
    volumes:
      - qbittorrent_data:/config
      - downloads_data:/downloads
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:4.0.17
    platform: linux/arm64
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - URLBASE=/sonarr
    ports:
      - "8989:8989"
    volumes:
      - sonarr_data:/config
      - ~/media-server-data/media:/media
      - downloads_data:/downloads
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:6.1.1
    platform: linux/arm64
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - URLBASE=/radarr
    ports:
      - "7878:7878"
    volumes:
      - radarr_data:/config
      - ~/media-server-data/media:/media
      - downloads_data:/downloads
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr:2.3.5
    platform: linux/arm64
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - URLBASE=/prowlarr
    ports:
      - "9696:9696"
    volumes:
      - prowlarr_data:/config
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    platform: linux/arm64
    container_name: jellyseerr
    init: true
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055
    ports:
      - "5055:5055"
    volumes:
      - jellyseerr_data:/app/config
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    platform: linux/arm64
    container_name: homepage
    environment:
      - HOMEPAGE_VAR_RADARR_KEY=${RADARR_KEY}
      - HOMEPAGE_VAR_SONARR_KEY=${SONARR_KEY}
      - HOMEPAGE_VAR_JELLYSEERR_KEY=${JELLYSEERR_KEY}
      - HOMEPAGE_VAR_JELLYFIN_KEY=${JELLYFIN_KEY}
      - HOMEPAGE_VAR_PLEX_TOKEN=${PLEX_TOKEN}
      - HOMEPAGE_VAR_NZBGET_USER=${NZBGET_USER}
      - HOMEPAGE_VAR_NZBGET_PASS=${NZBGET_PASS}
      - HOMEPAGE_VAR_QBIT_USER=${QBIT_USER}
      - HOMEPAGE_VAR_QBIT_PASS=${QBIT_PASS}
      - HOMEPAGE_VAR_EMBY_KEY=${EMBY_KEY}
      - HOMEPAGE_ALLOWED_HOSTS=home-plex.miguelemmara.me,dashboard.miguelemmara.me,localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./homepage:/app/config
    restart: unless-stopped

volumes:
  plex_data:
  qbittorrent_data:
  sonarr_data:
  radarr_data:
  prowlarr_data:
  jellyseerr_data:
  jellyfin_data:
  emby_data:
  nzbget_data:
  nginx_data:
  downloads_data:
